<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SALAMA - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a; color: #fafafa;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem; text-align: center;
    }
    .container { max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.6; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: #888; font-size: 0.95rem; line-height: 1.5; margin-bottom: 2rem; }
    button {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white; border: none; padding: 0.75rem 2rem;
      border-radius: 12px; font-size: 1rem; cursor: pointer;
      font-weight: 500; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128268;</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
